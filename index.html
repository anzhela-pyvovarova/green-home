<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Home</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <a href="#" class="header-logo">
                <img src="img/logo.png" alt="" class="header-logo-image">
                <span class="logo-text">Green Home</span>
            </a>
            <nav class="nav">
                <a href="#">Home</a>
                <a href="#">Plants</a>
                <a href="#">Care</a>
                <a href="#">Gallery</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1 class="hero-title">My houseplants</h1>
                <div class="hero-description">I present to you a catalog of my houseplants. It contains plant descriptions, photos, characteristics, and growing information.</div>
                <button class="hero-button">Explore Plants</button>
            </div>

            <div class="hero-img">
                
                    <img src="img/hero.png" alt="">
                
            </div>
        </div>
    </section>

    <section class="popular-plants">
        <div class="container">
            <div class="plant-card">
                <h3 class="plant-title">Balsamin</h3>
                <img src="img/cards/balsamin.jpg" alt="Balsamin">
                <button>Подробнее</button>
            </div>



            <div class="plant-card">
                <h3 class="plant-title">Bonsai</h3>
                <img src="img/cards/bonsai.jpg" alt="Bonsai">
                <button>Подробнее</button>
            </div>

            <div class="plant-card">
                <h3 class="plant-title">Chlorofitum</h3>
                <img src="img/cards/chlorofitum.jpg" alt="Chlorofitum">
                <button>Подробнее</button>
            </div>

            <div class="plant-card">
                <h3 class="plant-title">Geran</h3>
                <img src="img/cards/geran.jpg" alt="Geran">
                <button>Подробнее</button>
            </div>

            <div class="plant-card">
                <h3 class="plant-title">Jelow</h3>
                <img src="img/cards/jelow.jpg" alt="Jelow">
                <button>Подробнее</button>
            </div>

            <div class="plant-card">
                <h3 class="plant-title">Tomate</h3>
                <img src="img/cards/tomate.jpg" alt="Tomate">
                <button>Подробнее</button>
            </div>
           
            
        </div>
    </section>

    <section class="care-tips">
        <div class="container">
            <div class="tip-card"></div>
            <div class="tip-card"></div>
            <div class="tip-card"></div>
        </div>
    </section>

    <section class="gallery">
        <div class="container">
            <div class="gallery-item"></div>
            <div class="gallery-item"></div>
            <div class="gallery-item"></div>
            <div class="gallery-item"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">

        </div>
    </footer>
</body>

</html>
